<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Spotify - Your favourite music is here</title>
        <link rel="stylesheet" href="style.css">
        </head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify"> Spotify</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="container">
        <div class="songList">
            <h1>Best of 2025 Playlist</h1>
            <div class="songItemContainer">
                
                <div class="songItem">
                    
                    <img  alt="1">
                    <span class="songName">Song 1</span>
                    <span class="songlistplay"><span class="timestamp"> <i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="0"></i> </span></span>
                 
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 2 </span>
                    <span class="songlistplay"><span class="timestamp"> <i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="1"></i> </span></span>
                    
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 3</span>
                    <span class="songlistplay"> <i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="2"></i></span>
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 4</span>
                    <span class="songlistplay"><i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="3"></i></span>
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 5</span>
                    <span class="songlistplay"><i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="4"></i></span>
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 6</span>
                    <span class="songlistplay"><span class="timestamp"></span><i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="5"></i></span>
                </div>
                <div class="songItem">
                    <img alt="1">
                    <span class="songName">Song 7</span>
                    <span class="songlistplay"><span class="timestamp"><i
                                class="fa-regular fa-1x fa-circle-play songItemPlay" id="6"></i></span>
                </div>
               
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
         <div class="songInfo">
            <img src="./playing.gif" width="42px" id="gif"><span  id="masterSongName"> </span></div>
        
        <div class="icons">
            <!-- fontawesome icons -->
            <i class="fas fa-3x fa-step-backward" id="previous"></i>
            <i class="far fa-3x fa-circle-play" id="masterPlay"></i>
            <i class="fas fa-3x fa-step-forward" id="next"></i> 
        </div>
        </div>
      
        
    </div>
    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/7aa145cfd1.js" crossorigin="anonymous"></script>

</body>
</html>
